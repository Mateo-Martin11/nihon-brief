/* Rendu leger du markdown autorise par le proxy : gras et listes seulement.
   Le texte est ECHAPPE d'abord — jamais de HTML brut venant du reseau. */
function mdLite(text){
  const safe = esc(text).replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  let html = '', inList = false;
  for (const l of safe.split('\n')) {
    // le modele glisse parfois un titre markdown malgre la consigne :
    // on le rend comme un intertitre sobre plutot que d'afficher les #
    if (/^\s*#{1,4}\s+/.test(l)) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<p style="margin:10px 0 4px;font-weight:700;color:#111">${l.replace(/^\s*#{1,4}\s+/, '')}</p>`;
      continue;
    }
    if (/^\s*-\s+/.test(l)) {
      if (!inList) { html += '<ul style="margin:6px 0;padding-left:18px">'; inList = true; }
      html += `<li style="margin:2px 0">${l.replace(/^\s*-\s+/, '')}</li>`;
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      if (l.trim()) html += `<p style="margin:6px 0">${l}</p>`;
    }
  }
  return html + (inList ? '</ul>' : '');
}

function iaBtn(it){
  // hors ligne : le bouton n'apparait que si une reponse est deja en cache
  const cached = iaCache[it.id];

  const quoi = esc(it.jp || it.title);
  const open = state.iaOpen === it.id;
  return `<button type="button" class="hit" data-ia="${it.id}" aria-expanded="${open}" aria-label="En savoir plus sur « ${quoi} » avec l'IA" style="cursor:pointer;font:800 10px 'Hanken Grotesk';letter-spacing:.18em;color:${open ? '#fff' : '#76736a'};background:${open ? '#141414' : 'transparent'};border:1px solid ${open ? '#141414' : '#d9d4c8'};border-radius:999px;padding:4px 12px;transition:background .15s,color .15s">IA</button>`;
}

function iaPanel(it){
  if (state.iaOpen !== it.id) return '';
  const cached = iaCache[it.id];
  const loading = state.iaLoading === it.id;
  return `<div role="region" aria-label="Complément IA" style="border-top:1px solid #eceae3;background:#fbfaf7;padding:11px 16px 13px;font:400 13px/1.6 'Hanken Grotesk';color:#3f3c35;text-align:left"${loading ? ' aria-busy="true"' : ''}>${

/* --------------------------------------------------------------- render */
/* Un re-rendu remplace tout le innerHTML, donc l'element focalise disparait et
   le focus retombe sur <body> : au clavier, on perd sa place a chaque filtre
   active. On note quel controle etait focalise, puis on le retrouve apres. */
function focusKey(){
  const el = document.activeElement;
  if (!el || el === document.body) return null;
  for (const a of ['data-cat','data-seg','data-day','data-stamp','data-ia','data-map']) {
    if (el.hasAttribute?.(a)) return `[${a}="${el.getAttribute(a)}"]`;
  }
  return el.id ? '#' + el.id : null;
}

function restoreFocus(key, selStart, selEnd){
  if (!key) return;
  const el = document.querySelector(key);
  if (!el) return;
  el.focus({preventScroll:true});
  if (selStart != null && el.setSelectionRange) {
    try { el.setSelectionRange(selStart, selEnd); } catch (e) {}
  }
}

/* ---------------------------------------------------------------- events
   Attaché UNE SEULE FOIS, au démarrage. render() remplace le innerHTML du
   shell mais pas le shell lui-même : rattacher ici à chaque rendu empilerait
   les écouteurs et ferait tourner toggle() n fois par clic. */
function wire(){
  const shell = document.getElementById('shell');

  shell.addEventListener('input', e => {
    if (e.target.id !== 'q') return;
    state.query = e.target.value;
    render();   // render() replace le focus et le curseur tout seul
  });

  shell.addEventListener('click', e => {
    if (e.target.closest('#clear')) { state.query = ''; return render(); }
    if (e.target.closest('#reset')) {
      Object.assign(state, {query:'', cat:'all', day:0, seg:'all'});
      return render();
    }
    const cat = e.target.closest('[data-cat]');
    if (cat) { state.cat = cat.dataset.cat; return render(); }
    const seg = e.target.closest('[data-seg]');
    if (seg) { state.seg = seg.dataset.seg; return render(); }
    const day = e.target.closest('[data-day]');
    if (day) { state.day = Number(day.dataset.day); return render(); }
    if (e.target.closest('#btn-home')) {
      Object.assign(state, {query:'', cat:'all', day:0, seg:'all'});
      render();
      window.scrollTo({top:0, behavior: matchMedia('(prefers-reduced-motion: reduce)').matches ? 'auto' : 'smooth'});
      return;
    }
    if (e.target.closest('#btn-review')) return openReview();
    if (e.target.closest('#btn-book'))   return openBook();
    if (e.target.closest('#btn-quiz'))   return openQuiz();
    const mp = e.target.closest('[data-map]');
    if (mp) { const id = Number(mp.dataset.map); state.mapOpen = state.mapOpen === id ? null : id; return render(); }
    const ia = e.target.closest('[data-ia]');
    if (ia) return iaToggle(Number(ia.dataset.ia));
    const stamp = e.target.closest('[data-stamp]');
    if (stamp) { toggle(Number(stamp.dataset.stamp)); }
  });

  // le bouton IA depend du reseau : re-rendu quand la connexion change
  window.addEventListener('online', render);
  window.addEventListener('offline', render);
}

/* -------------------------------------------------------------- bouton IA */
async function iaToggle(id){
  if (state.iaOpen === id) { state.iaOpen = null; return render(); }
  state.iaOpen = id;
  if (iaCache[id]) return render();
  state.iaLoading = id;
  state.iaError = null;
  render();
  try {
    const d = DATA.find(x => x.id === id);
    const payload = {};
    for (const f of ['cat','title','jp','kana','romaji','fr','meta','body']) {
      if (d && d[f]) payload[f] = d[f];
    }
    const r = await fetch(IA_URL, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const out = await r.json();
    if (!r.ok || !out.text) throw new Error(out.error || 'Réponse vide.');
    iaCache[id] = out.text;
    try { localStorage.setItem('nihon-ia-cache', JSON.stringify(iaCache)); } catch (e) {}
  } catch (err) {
    state.iaError = err.message === 'Failed to fetch'
      ? (navigator.onLine
          ? 'Appel bloqué — un bloqueur de pub filtre peut-être workers.dev. Réessaie en le désactivant pour ce site.'
          : 'Pas de connexion.')
      : String(err.message || 'Erreur.');
  } finally {
    if (state.iaLoading === id) state.iaLoading = null;
    render();
  }
}

/* =========================================================================
   ALEA DETERMINISTE — chaque fiche a une "personnalite" stable (angle, forme,
   taille de tampon) derivee de son id. Pas de Math.random : le carnet doit
   etre identique a chaque ouverture et d'un appareil a l'autre.
   ========================================================================= */
function srand(id, n){
  const x = Math.sin(id * 127.1 + n * 311.7) * 43758.5453;
  return x - Math.floor(x);
}

/* =========================================================================
   MODE REVISION — pile de cartes plein ecran, geste ou boutons.
   Droite / → : je savais (tamponne). Gauche / ← : a revoir (remise en fin
   de pile). Tap / espace : reveler la reponse. Le deck herite des filtres.
   ========================================================================= */
function openReview(){
  const deck = getFiltered().map(d => d.id);
  // melange de Fisher-Yates — l'ordre de la liste serait trop previsible
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  state.book = null; state.quiz = null;
  state.review = {deck, i:0, revealed:false, stamped:0};
  renderOverlays();
}

function reviewCard(){
  const r = state.review;
  if (!r || r.i >= r.deck.length) return null;
  return DATA.find(d => d.id === r.deck[r.i]);
}

/* Boutons et clavier passent par le meme vol de carte que le swipe : elle
   part a droite pour « je savais », a gauche pour « a revoir », badge allume. */
function flyAndAct(action){
  const card = document.getElementById('rv-card');
  const rm = matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (!card || rm) return reviewAct(action);
  if (card.dataset.flying) return;   // ignore un second declenchement en plein vol
  card.dataset.flying = '1';
  // L'animation d'entree (rvIn, fill:both) garde la main sur transform dans la
  // cascade : tant qu'elle est la, la transition de vol est supprimee et la
  // carte se teleporte. On la retire et on acte l'etat de repos (reflow)
  // avant de lancer le vol.
  card.style.animation = 'none';
  void card.offsetWidth;
  const hint = card.querySelector(action === 'know' ? '[data-hint-r]' : '[data-hint-l]');
  if (hint) hint.style.opacity = 1;
  card.classList.add(action === 'know' ? 'rv-fly-r' : 'rv-fly-l');
  setTimeout(() => reviewAct(action), 340);
}

function reviewAct(action){
  const r = state.review, d = reviewCard();
  if (!d) return;
  if (action === 'know') {
    // tamponne, mais ne DE-tamponne jamais une fiche deja maitrisee
    if (!state.mastered.includes(d.id)) { toggle(d.id); r.stamped++; }
  } else {
    r.deck.push(d.id);   // « a revoir » : la fiche reviendra en fin de pile
  }
  r.i++; r.revealed = false;
  renderOverlays();
}

/* =========================================================================
   CARNET DE TAMPONS — un livre qui s'ouvre, des pages qui tournent, et un
   tampon unique par fiche : forme, taille, angle et couleur derives de l'id,
   kanji de categorie au centre, romaji grave en arc pour les fiches de langue.
   ========================================================================= */
/* Un carnet de stamp rally reel a des CASES IMPRIMEES sur la page — trait fin
   continu, kanji en filigrane — et le tampon, quand il est pose, DEBORDE de sa
   case, incline, jamais parfaitement centre. Le pointille etait un tic de CSS. */
function bkShape(shapeR, inset, attrs){
  if (shapeR < .55)  return `<circle cx="50" cy="50" r="${46 - inset}" ${attrs}/>`;
  if (shapeR < .82)  return `<rect x="${7 + inset}" y="${7 + inset}" width="${86 - 2*inset}" height="${86 - 2*inset}" rx="${Math.max(4, 13 - inset/2)}" ${attrs}/>`;
  const k = inset / 46;
  const pts = [[50,4],[90,27],[90,73],[50,96],[10,73],[10,27]]
    .map(([x,y]) => [(50 + (x-50)*(1-k)).toFixed(1), (50 + (y-50)*(1-k)).toFixed(1)].join(',')).join(' ');
  return `<polygon points="${pts}" ${attrs}/>`;
}

// case imprimee : trait #d9d3c2, filigrane du kanji de categorie
function frameSVG(d){
  const cm = CAT_MAP[d.cat] || {kanji:'?'};
  const glyph = (d.cat === 'Kanji' && d.jp) ? d.jp : cm.kanji;
  return `<svg viewBox="0 0 100 100" aria-hidden="true" style="position:absolute;inset:0;width:100%;height:100%">
    ${bkShape(srand(d.id,1), 2, 'fill="none" stroke="#d9d3c2" stroke-width="2"')}
    <text x="50" y="50" dy="0.36em" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-weight="900" font-size="${glyph.length > 1 ? 24 : 30}" fill="#8a8478" opacity=".15">${esc(glyph)}</text>
  </svg>`;
}

// le tampon encre, pose PAR-DESSUS la case : plus grand qu'elle, tourne
function inkStampSVG(d){
  const cm = CAT_MAP[d.cat] || {kanji:'?', ink:'#5c5c5c'};
  const s = n => srand(d.id, n);
  const shapeR = s(1);
  const rot = (s(2) * 16 - 8).toFixed(1);
  const scale = (108 + s(3) * 16).toFixed(0);   // 108–124 % de la case
  const glyph = (d.cat === 'Kanji' && d.jp) ? d.jp : cm.kanji;
  const ink = cm.ink;
  const uid = 'st' + d.id;
  const arc = (shapeR < .55 && (d.romaji || d.cat))
    ? `<defs><path id="${uid}" d="M50,50 m-31,0 a31,31 0 1,1 62,0 a31,31 0 1,1 -62,0"/></defs>
       <text font-family="'Hanken Grotesk',sans-serif" font-size="7.5" font-weight="800" letter-spacing="1.6" fill="#fff" opacity=".9"><textPath href="#${uid}">${esc(((d.romaji || d.cat).toUpperCase() + ' · ').repeat(3).slice(0, 30))}</textPath></text>`
    : '';
  return `<svg viewBox="0 0 100 100" aria-hidden="true" style="position:absolute;left:50%;top:50%;width:${scale}%;height:${scale}%;transform:translate(-50%,-50%) rotate(${rot}deg);filter:url(#ink)">
    ${bkShape(shapeR, 0, `fill="${ink}"`)}
    ${bkShape(shapeR, 8, 'fill="none" stroke="#fff" stroke-width="1.6" opacity=".85"')}
    ${arc}
    <text x="50" y="50" dy="0.36em" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-weight="900" font-size="${glyph.length > 1 ? 24 : 32}" fill="#fff">${esc(glyph)}</text>
  </svg>`;
}

function bookPages(){
  const list = [];
  for (const [n] of CATS) list.push(...DATA.filter(d => d.cat === n));
  const pages = [{type:'summary'}];
  for (let i = 0; i < list.length; i += 9) pages.push({type:'stamps', items:list.slice(i, i + 9)});
  return pages;
}

function openBook(){
  state.review = null; state.quiz = null;
  state.book = {page:0, opened:false};
  renderOverlays();
  // double rAF : la couverture doit etre peinte fermee avant de s'ouvrir
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.getElementById('bk-cover')?.classList.add('open');
    setTimeout(() => { if (state.book) state.book.opened = true; }, 2000);
  }));
}

/* Desktop = double page, comme un livre pose a plat : on avance de 2 et la
   derniere page impaire fait face a une page blanche. Mobile = page a page. */
function isSpread(){ return matchMedia('(min-width:900px)').matches; }
function lastStart(N){ return isSpread() ? (N % 2 === 0 ? N - 2 : N - 1) : N - 1; }

function bookTurn(dir){
  const b = state.book;
  if (!b) return;
  const N = bookPages().length;
  const step = isSpread() ? 2 : 1;
  let np = b.page + dir * step;
  if (np < 0) np = 0;
  if (np > lastStart(N) || np === b.page) return;
  b.opened = true;
  b.lastDir = dir;   // la page entrante arrive du cote d'ou l'on vient
  const el = document.getElementById('bk-page');
  const rm = matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (el && !rm) {
    el.classList.add(dir > 0 ? 'bk-turn-out' : 'bk-turn-out-r');
    setTimeout(() => { if (state.book) { state.book.page = np; renderOverlays(); } }, 320);
  } else {
    b.page = np; renderOverlays();
  }
}

/* Page de titre composee comme de l'imprimerie : double filet, compte en

function tplBkSummary(){
  const doneIds = state.mastered.filter(id => DATA.some(d => d.id === id));

    return `<div style="display:flex;align-items:baseline;gap:6px;min-width:0">

/* =========================================================================
   RENDU ET CABLAGE DES OVERLAYS
   ========================================================================= */
/* =========================================================================
   CARTE — frontières réelles des 47 préfectures (GSI via dataofjapan,
   simplifiées par mapshaper, encodées en topojson). Rien n'est dessiné à la
   main : le littoral est décodé puis projeté en Mercator au premier appel.
   Les fiches portant un champ geo:[lat,lon] gagnent un bouton 地図 CARTE.
   ========================================================================= */
const JP_REGION = {Hokkai:0, Aomori:1, Iwate:1, Miyagi:1, Akita:1, Yamagata:1, Fukushima:1,
  Ibaraki:2, Tochigi:2, Gunma:2, Saitama:2, Chiba:2, Tokyo:2, Kanagawa:2,
  Niigata:3, Toyama:3, Ishikawa:3, Fukui:3, Yamanashi:3, Nagano:3, Gifu:3, Shizuoka:3, Aichi:3,
  Mie:4, Shiga:4, Kyoto:4, Osaka:4, Hyogo:4, Nara:4, Wakayama:4,
  Tottori:5, Shimane:5, Okayama:5, Hiroshima:5, Yamaguchi:5,
  Tokushima:6, Kagawa:6, Ehime:6, Kochi:6,
  Fukuoka:7, Saga:7, Nagasaki:7, Kumamoto:7, Oita:7, Miyazaki:7, Kagoshima:7, Okinawa:7};
/* Huit lavis pâles, un par grande région — Hokkaidō, Tōhoku, Kantō, Chūbu,
   Kansai, Chūgoku, Shikoku, Kyūshū-Okinawa. */
const JP_TINTS = ['#dbe7e2','#e1dfee','#f2dedb','#e4ead7','#f4e5c6','#dde6f0','#eedfe8','#eddbc9'];

let JP_CACHE = null;
function jpBuild(){
  if (JP_CACHE) return JP_CACHE;
  const t = JP_TOPO, sc = t.transform.scale, tr = t.transform.translate;
  const arcs = t.arcs.map(arc => {
    let x = 0, y = 0;
    return arc.map(p => { x += p[0]; y += p[1]; return [x*sc[0]+tr[0], y*sc[1]+tr[1]]; });
  });
  const geoms = Object.values(t.objects)[0].geometries;
  const my = v => Math.log(Math.tan(Math.PI/4 + v*Math.PI/360));
  const mk = (lon0, lon1, lat0, lat1, w) => {
    const y0 = my(lat0), y1 = my(lat1);
    const h = Math.round(w * (y1 - y0) / ((lon1 - lon0) * Math.PI / 180));
    return {w, h, lon0, lon1, lat0, lat1,
            proj: (lon, lat) => [(lon - lon0) / (lon1 - lon0) * w, (1 - (my(lat) - y0) / (y1 - y0)) * h]};
  };
  const build = v => {
    let out = '';
    for (const g of geoms) {
      const region = JP_REGION[g.properties.nam.split(' ')[0]] ?? 3;
      const polys = g.type === 'Polygon' ? [g.arcs] : g.arcs;
      let d = '';
      for (const poly of polys) for (const ring of poly) {
        let pts = [];
        for (const ai of ring) { const a = ai < 0 ? arcs[~ai].slice().reverse() : arcs[ai]; pts = pts.concat(a); }
        if (!pts.some(([x, y]) => x > v.lon0 && x < v.lon1 && y > v.lat0 && y < v.lat1)) continue;
        d += 'M' + pts.map(([x, y]) => v.proj(x, y).map(n => n.toFixed(1)).join(' ')).join('L') + 'Z';
      }
      if (d) out += `<path d="${d}" fill="${JP_TINTS[region]}"/>`;
    }
    return out;
  };
  const main = mk(128.6, 146.4, 29.8, 45.9, 380); main.paths = build(main);
  const oki  = mk(126.4, 128.5, 25.9, 27.05, 380); oki.paths  = build(oki);
  JP_CACHE = {main, oki};
  return JP_CACHE;
}

function jpMapSVG(it){
  const P = jpBuild();
  const [lat, lon] = it.geo;
  const isOki = lat < 29;
  const v = isOki ? P.oki : P.main;
  const [cx, cy] = v.proj(lon, lat).map(n => +n.toFixed(1));
  const name = esc(it.place || it.title || it.jp || '');
  const pw = Math.min(v.w - 16, name.length * 6.4 + 20);
  const flip = cx > v.w * .55;
  const px = Math.max(4, flip ? cx - pw - 13 : cx + 13);
  const py = Math.max(6, Math.min(v.h - 28, cy - 11));
  return `<svg viewBox="0 0 ${v.w} ${v.h}" role="img" aria-label="${name} — carte du Japon" style="display:block;width:100%;max-width:430px;margin:0 auto">
    <g stroke="#948d7c" stroke-width=".45" stroke-linejoin="round">${v.paths}</g>
    <circle class="map-pulse" cx="${cx}" cy="${cy}" r="11" fill="none" stroke="#E60012" stroke-width="1.6"/>
    <circle cx="${cx}" cy="${cy}" r="4.4" fill="#E60012" stroke="#fff" stroke-width="1.5"/>
    <g font-family="'Hanken Grotesk',sans-serif">
      <rect x="${px.toFixed(1)}" y="${py.toFixed(1)}" width="${pw.toFixed(1)}" height="22" rx="6" fill="#141414"/>
      <text x="${(px + pw / 2).toFixed(1)}" y="${(py + 15).toFixed(1)}" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">${name}</text>
    </g>
    ${isOki ? `<text x="10" y="${v.h - 10}" font-size="12" font-weight="800" fill="#948d7c" font-family="'Noto Sans JP',sans-serif">沖縄 OKINAWA</text>` : ''}
  </svg>`;
}

function mapBtn(it){
  if (!it.geo) return '';
  const open = state.mapOpen === it.id;
  return `<button type="button" class="hit" data-map="${it.id}" aria-expanded="${open}" aria-label="Situer « ${esc(it.place || it.title || it.jp)} » sur la carte" style="cursor:pointer;font:800 10px 'Hanken Grotesk';letter-spacing:.14em;color:${open ? '#fff' : '#76736a'};background:${open ? '#141414' : 'transparent'};border:1px solid ${open ? '#141414' : '#d9d4c8'};border-radius:999px;padding:4px 12px;transition:background .15s,color .15s"><span style="font:800 10px 'Noto Sans JP';letter-spacing:0">地図</span> CARTE</button>`;
}

function mapPanel(it){
  if (state.mapOpen !== it.id || !it.geo) return '';
  return `<div role="region" aria-label="Carte" style="border-top:1px solid #eceae3;background:#f7f4ec;padding:13px 14px 14px">${jpMapSVG(it)}</div>`;

/* =========================================================================
   QUIZ — QCM générés automatiquement depuis les fiches, un sceau par
   catégorie. 80 % de bonnes réponses décrochent le sceau. Les mauvaises
   réponses sont piochées dans les autres fiches : aucun contenu à écrire.
   ========================================================================= */
const QZ_PAPER = [246, 243, 234];   // fond papier #f6f3ea du quiz, pour ink()
/* Grades a la maniere des kentei : on gravit 三級 puis 二級 puis 一級.
   Seuil de reussite par grade, en part de bonnes reponses. */
const KYU = [null, '三級', '二級', '一級'];
const KYU_NEED = [null, .75, .8, .9];
const DIF_KANJI = [null, '一', '二', '三'];

/* Clé en littéral : loadBadges est hissée et tourne avant les const de ce
   bloc (init de state) — une const partagée serait encore en zone morte. */
function loadBadges(){
  try {
    const b = JSON.parse(localStorage.getItem('nihon-briefing-badges') || '{}');
    if (Array.isArray(b)) { const o = {}; for (const k of b) o[k] = 1; return o; }   // ancien format
    return (b && typeof b === 'object') ? b : {};
  }
  catch(e){ return {}; }
}
function saveBadges(){
  try { localStorage.setItem('nihon-briefing-badges', JSON.stringify(state.badges)); } catch(e){}
}

function qzShuffle(a){
  a = a.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* Première proposition du body — sert de définition dans les QCM. */
function qzClause(d){
  const s = d.body || '';
  let cut = s.length;
  for (const t of ['. ', ' — ', ' : ']) {
    const k = s.indexOf(t);
    if (k > 14 && k < cut) cut = k;
  }
  let out = s.slice(0, Math.min(cut, 110)).trim();
  if (out.length < s.length) out += '…';
  return out;
}

const qzTerm = d => d.romaji ? `${d.jp} · ${d.romaji}` : d.jp;

function qzMake(prompt, correct, wrongs){
  const opts = qzShuffle([correct, ...wrongs.filter(w => w && w !== correct).slice(0, 3)]);
  if (opts.length < 3) return null;
  return {prompt, opts, ok: opts.indexOf(correct)};
}

/* Distracteurs : la catégorie d'abord, tout le jeu de données en secours. */
function qzOthers(pool, d, val){
  const local = pool.filter(x => x !== d && val(x));
  const src = local.length >= 3 ? local : DATA.filter(x => x !== d && val(x));
  const seen = new Set([val(d)]);
  const out = [];
  for (const x of qzShuffle(src)) {
    const v = val(x);
    if (!seen.has(v)) { seen.add(v); out.push(v); }
  }
  return out;
}

function qzVocab(d, pool){
  if (Math.random() < 0.5) {
    return qzMake(`Que veut dire « ${d.jp} » (${d.romaji}) ?`, d.fr,
                  qzOthers(pool, d, x => x.fr || null));
  }
  return qzMake(`Comment dit-on : « ${d.fr} » ?`, qzTerm(d),
                qzOthers(pool, d, x => x.fr ? qzTerm(x) : null));
}

function qzDef(d, pool){
  const isHyb = x => (x.jp && x.body && !x.fr) ? x : null;
  if (Math.random() < 0.5) {
    return qzMake(`« ${qzTerm(d)} », c'est…`, qzClause(d),
                  qzOthers(pool, d, x => isHyb(x) ? qzClause(x) : null));
  }
  return qzMake(`Quel terme correspond à : « ${qzClause(d)} » ?`, qzTerm(d),
                qzOthers(pool, d, x => isHyb(x) ? qzTerm(x) : null));
}

/* Un nombre du body est masqué ; les leurres gardent le même ordre de
   grandeur (une année est décalée, une quantité est multipliée). */
function qzNum(d){
  const body = d.body || '';
  const m = body.match(/\d{1,3}(?:\s\d{3})+|\d+,\d+|\d{2,4}/);
  if (!m) return null;
  const tok = m[0];
  let sent = body.split('. ').find(p => p.includes(tok)) || body;
  if (sent.length > 160) {
    const k = sent.indexOf(tok), a = Math.max(0, k - 70);
    sent = (a > 0 ? '…' : '') + sent.slice(a, k + tok.length + 75) + '…';
  }
  const masked = sent.replace(tok, '___');
  const spaced = tok.includes(' ');
  const fmt = x => spaced ? String(x).replace(/\B(?=(\d{3})+(?!\d))/g, ' ') : String(x);
  let alts;
  if (tok.includes(',')) {
    const f = parseFloat(tok.replace(',', '.'));
    alts = [f * 2, f * 0.6, f * 1.4].map(x => String(Math.round(x * 100) / 100).replace('.', ','));
  } else {
    const n = parseInt(tok.replace(/\s/g, ''), 10);
    alts = (n >= 1300 && n <= 2099 && !spaced)
      ? [n - 13, n + 9, n - 27].map(String)
      : [Math.round(n / 2), n * 2, Math.round(n * 1.5)].filter(x => x > 0 && x !== n).map(fmt);
  }
  alts = [...new Set(alts)].filter(a => a !== tok);
  return qzMake(`Complète : « ${masked} »`, tok, alts);
}

/* Extrait du body, mots du titre voilés pour ne pas souffler la réponse. */
function qzFact(d, pool){
  if (!d.title || !d.body) return null;
  const wrongs = qzOthers(pool, d, x => (x.title && x.body) ? x.title : null);
  let ex = d.body.slice(0, 155);
  if (d.body.length > 155) ex += '…';
  for (const w of d.title.split(/\s+/)) {
    const wc = w.replace(/[«»,.:!?'’()]/g, '');
    if (wc.length > 3) ex = ex.replace(new RegExp(wc.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), '▢▢');
  }
  return qzMake(`Quel fait est décrit ici ? « ${ex} »`, d.title, wrongs);
}

function qzFor(d, pool){
  const h = QZ[d.id];
  if (h) return qzMake(h.q, h.a, h.x.slice());
  if (d.meta) return qzMake(`Que signifie le kanji « ${d.jp} » ?`, d.meta,
                            qzOthers(pool, d, x => x.meta || null));
  if (d.fr) return qzVocab(d, pool);
  const cand = [];
  if (d.jp && d.body) cand.push(() => qzDef(d, pool));
  if (d.body && /\d\d/.test(d.body)) cand.push(() => qzNum(d));
  if (d.title && d.body) cand.push(() => qzFact(d, pool));
  while (cand.length) {
    const q = cand.splice(Math.floor(Math.random() * cand.length), 1)[0]();
    if (q) return q;
  }
  return null;
}

function buildQuiz(key, rank){
  const all = key === 'all' ? DATA : DATA.filter(d => d.cat === key);
  let pool = all;
  if (rank === 1)      pool = all.filter(d => (DIF[d.id] || 2) <= 2);   // sans les pointues
  else if (rank === 3) pool = all.filter(d => (DIF[d.id] || 2) >= 2);   // sans les evidentes
  if (pool.length < 6) pool = all;
  const max = rank === 1 ? 8 : 10;
  const qs = [];
  for (const d of qzShuffle(pool)) {
    if (qs.length >= max) break;
    const q = qzFor(d, all);
    if (q) qs.push(q);
  }
  return qs;
}

function openQuiz(){
  state.review = null; state.book = null;
  state.quiz = {view:'menu'};
  renderOverlays();
}
function startQuiz(key){
  const rank = Math.min(3, (state.badges[key] || 0) + 1);
  state.quiz = {view:'play', key, rank, qs: buildQuiz(key, rank), i:0, score:0, picked:null, newBadge:false};
  renderOverlays();
}
function answerQuiz(ix){
  const q = state.quiz;
  if (!q || q.view !== 'play' || q.picked != null) return;
  q.picked = ix;
  if (ix === q.qs[q.i].ok) q.score++;
  renderOverlays();
}
function nextQuiz(){
  const q = state.quiz;
  if (q.i + 1 < q.qs.length) { q.i++; q.picked = null; return renderOverlays(); }
  q.view = 'done';
  const need = Math.ceil(q.qs.length * KYU_NEED[q.rank]);
  if (q.score >= need && (state.badges[q.key] || 0) < q.rank) {
    state.badges[q.key] = q.rank; saveBadges(); q.newBadge = true;
  }
  renderOverlays();
}

const qzCat = key => key === 'all'
  ? ['Tout', '総', '#E60012']
  : (c => [c[0], c[1], c[2]])(CATS.find(c => c[0] === key));

function tplQzMenu(){
  const total = CATS.length + 1;
  const got = Object.keys(state.badges).length;
  const seals = [['all', '総', 'Tout', '#E60012'], ...CATS.map(c => [c[0], c[1], c[0], c[2]])]
    .map(([key, kanji, label, color], ix) => {
      const rank = state.badges[key] || 0;
      const col = rank ? ink(color) : '#8a8478';
      const rot = (srand(ix + 3, 11) * 12 - 6).toFixed(1);
      const ring = rank >= 3 ? `;background:${col}1c;box-shadow:inset 0 0 0 2.5px #f6f3ea,inset 0 0 0 3.8px ${col}`
                 : rank === 2 ? `;background:${col}12;box-shadow:inset 0 0 0 2.5px #f6f3ea,inset 0 0 0 3.5px ${col}55`
                 : '';
      const next = Math.min(3, rank + 1);
      return `<button type="button" data-qzseal="${esc(key)}" class="hit" aria-label="Quiz ${esc(label)} — ${rank ? KYU[rank] + ' obtenu' : 'aucun grade'}, examen ${KYU[next]}" style="cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 2px 8px;border-radius:12px">
        <span aria-hidden="true" style="width:56px;height:56px;display:flex;align-items:center;justify-content:center;border-radius:50%;border:${rank ? `2.4px solid ${col}` : '2px dashed #a89f8d'};color:${col};font:900 23px 'Noto Sans JP';transform:rotate(${rot}deg)${ring}">${kanji}</span>
        <span style="font:700 11px 'Hanken Grotesk';color:${rank ? '#141414' : '#6d675c'};max-width:88px;text-align:center;line-height:1.15">${esc(label)}</span>
        <span aria-hidden="true" style="min-height:12px;font:900 10px 'Noto Sans JP';letter-spacing:.1em;color:${rank ? col : 'transparent'}">${rank ? KYU[rank] : '級'}</span>
      </button>`;
    }).join('');
  return `<div class="ov ov-quiz" role="dialog" aria-modal="true" aria-label="Quiz">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px 2px">
      <button type="button" id="qz-close" data-autofocus class="hit" aria-label="Fermer le quiz" style="width:44px;height:44px;cursor:pointer;color:#141414;font:700 16px 'Hanken Grotesk'">✕</button>
      <span style="font:900 17px 'Noto Sans JP';color:#141414">検定<span style="font:700 11px 'Hanken Grotesk';color:#6d675c;margin-left:8px;letter-spacing:.2em">QUIZ</span></span>
      <span class="tnum" style="font:800 12px 'Hanken Grotesk';color:${ink('#E60012', QZ_PAPER)};min-width:44px;text-align:right">${got}<span style="color:#6d675c;font-weight:700">/${total}</span></span>
    </div>
    <div style="margin:0 16px;border-top:2.2px solid #141414"></div>
    <div style="margin:2.5px 16px 0;border-top:1px solid #141414"></div>
    <p style="margin:0;padding:9px 18px 8px;font:600 12px 'Hanken Grotesk';color:#6d675c;text-align:center">Trois grades par sceau — l’examen 三級 ouvre la voie, le 一級 se mérite (90 %).</p>
    <div style="flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(94px,1fr));gap:8px 6px;align-content:start;padding:2px 12px 34px;max-width:860px;width:100%;margin:0 auto;box-sizing:border-box">${seals}</div>
  </div>`;
}

/* Correction au stylo rouge, à la japonaise : ○ (maru) encerclé sur la bonne
   réponse, ✗ (batsu) tracé sur la mauvaise — le trait s'anime comme un
   coup de stylo. */
function qzMaru(){
  return `<svg viewBox="0 0 38 38" width="38" height="38" aria-hidden="true" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);overflow:visible">
    <path d="M19 3.6 C28.5 3.4 34.6 9.8 34.4 19 C34.2 27.8 27.6 34.4 18.6 34.3 C9.8 34.2 3.6 27.4 3.8 18.4 C4 10.2 9.6 4.6 17 3.8" fill="none" stroke="${ink('#E60012', QZ_PAPER)}" stroke-width="2.7" stroke-linecap="round" style="stroke-dasharray:100;stroke-dashoffset:100;animation:penDraw .45s ease-out .05s forwards"/>
  </svg>`;
}
function qzBatsu(){
  const red = ink('#E60012', QZ_PAPER);
  return `<svg viewBox="0 0 38 38" width="34" height="34" aria-hidden="true" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);overflow:visible">
    <path d="M8 7.5 L30.5 30" fill="none" stroke="${red}" stroke-width="2.9" stroke-linecap="round" style="stroke-dasharray:34;stroke-dashoffset:34;animation:penDraw .22s ease-out .05s forwards"/>
    <path d="M30 8 L8.5 30.5" fill="none" stroke="${red}" stroke-width="2.9" stroke-linecap="round" style="stroke-dasharray:34;stroke-dashoffset:34;animation:penDraw .22s ease-out .28s forwards"/>
  </svg>`;
}

function tplQzPlay(){
  const q = state.quiz, cur = q.qs[q.i];
  const [label, kanji, color] = qzCat(q.key);
  const band = ink(color);
  const answered = q.picked != null;
  const NUM = ['①','②','③','④'];
  const opts = cur.opts.map((o, ix) => {
    const isOk = answered && ix === cur.ok;
    const isMiss = answered && ix === q.picked && ix !== cur.ok;
    const dim = answered && !isOk && !isMiss;
    const sr = isOk ? ' — bonne réponse' : isMiss ? ' — ta réponse, fausse' : '';
    return `<button type="button" data-qzopt="${ix}" ${answered ? 'disabled' : (ix === 0 ? 'data-autofocus' : '')} aria-label="${esc(o)}${sr}" style="cursor:${answered ? 'default' : 'pointer'};display:flex;gap:10px;align-items:flex-start;text-align:left;min-height:52px;padding:14px 8px 14px 0;background:transparent;border-bottom:1px solid #e2dbc8;font:600 14px/1.5 'Hanken Grotesk';color:#141414;${dim ? 'opacity:.38;' : ''}">
      <span aria-hidden="true" style="position:relative;flex:none;width:34px;display:flex;justify-content:center;font:700 16px 'Noto Sans JP';color:${isMiss ? ink('#E60012', QZ_PAPER) : '#141414'}">${NUM[ix] || '⑤'}${isOk ? qzMaru() : ''}${isMiss ? qzBatsu() : ''}</span>
      <span style="padding-top:1px">${esc(o)}</span>
    </button>`;
  }).join('');
  return `<div class="ov ov-quiz" role="dialog" aria-modal="true" aria-label="Quiz ${esc(label)}">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px 4px">
      <button type="button" id="qz-close" class="hit" aria-label="Abandonner le quiz" style="width:44px;height:44px;cursor:pointer;color:#141414;font:700 16px 'Hanken Grotesk'">✕</button>
      <span style="display:flex;align-items:center;gap:8px">
        <span aria-hidden="true" style="width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:5px;background:${band};color:#fff;font:900 14px 'Noto Sans JP'">${kanji}</span>
        <span style="font:800 13px 'Hanken Grotesk';color:#141414;letter-spacing:.04em">${esc(label)}</span>
        <span style="font:900 11px 'Noto Sans JP';letter-spacing:.08em;color:${ink('#E60012', QZ_PAPER)};border:1.6px solid ${ink('#E60012', QZ_PAPER)};border-radius:5px;padding:1px 6px">${KYU[q.rank]}</span>
      </span>
      <span class="tnum" style="font:800 12px 'Hanken Grotesk';color:#141414;min-width:44px;text-align:right"><span style="font:900 12px 'Noto Sans JP';color:${ink('#E60012', QZ_PAPER)}">問</span> ${q.i + 1}<span style="color:#6d675c;font-weight:700">/${q.qs.length}</span></span>
    </div>
    <div style="margin:0 16px;border-top:2.2px solid #141414"></div>
    <div style="margin:2.5px 16px 0;border-top:1px solid #141414"></div>
    <div style="flex:1;overflow-y:auto;padding:6px 18px 30px;box-sizing:border-box">
      <div style="max-width:560px;margin:0 auto;background:linear-gradient(90deg,transparent 15px,rgba(230,0,18,.16) 15px,rgba(230,0,18,.16) 16.4px,transparent 16.4px);padding-left:34px">
        <p style="margin:14px 0 4px;font:700 15px/1.55 'Hanken Grotesk';color:#141414"><span aria-hidden="true" style="font:900 14px 'Noto Sans JP';color:${ink('#E60012', QZ_PAPER)};margin-right:7px">問${q.i + 1}</span>${esc(cur.prompt)}</p>
        <div style="display:flex;flex-direction:column">${opts}</div>
        ${answered ? `<span role="status" style="position:absolute;left:-9999px">${q.picked === cur.ok ? 'Bonne réponse.' : 'Mauvaise réponse. La bonne réponse était : ' + esc(cur.opts[cur.ok])}</span>` : ''}
      <div style="min-height:58px;display:flex;align-items:center;justify-content:flex-end;padding-top:10px">
          ${answered ? `<button type="button" id="qz-next" data-autofocus style="cursor:pointer;background:#E60012;color:#fff;border-radius:10px;padding:14px 22px;font:800 13px 'Hanken Grotesk';letter-spacing:.06em">${q.i + 1 < q.qs.length ? 'SUIVANT' : 'RÉSULTAT'}</button>` : ''}
        </div>
      </div>
    </div>
  </div>`;
}

function tplQzResult(){
  const q = state.quiz, n = q.qs.length, need = Math.ceil(n * KYU_NEED[q.rank]);
  const [label, kanji, color] = qzCat(q.key);
  const win = q.score >= need;
  const col = win ? ink(color) : '#8a8478';
  const red = ink('#E60012', QZ_PAPER);
  const verdict = win ? '合格' : '不合格';
  const msg = win ? (q.newBadge ? `Grade ${KYU[q.rank]} décroché !` : 'Déjà au grade 一級 — run de prestige.')
                  : `Il fallait ${need} bonnes réponses sur ${n}.`;
  return `<div class="ov ov-quiz" role="dialog" aria-modal="true" aria-label="Résultat du quiz">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px 4px">
      <button type="button" id="qz-close" class="hit" aria-label="Fermer le quiz" style="width:44px;height:44px;cursor:pointer;color:#141414;font:700 16px 'Hanken Grotesk'">✕</button>
      <span style="font:900 17px 'Noto Sans JP';color:#141414">結果<span style="font:700 11px 'Hanken Grotesk';color:#6d675c;margin-left:8px;letter-spacing:.2em">RÉSULTAT</span></span>
      <span style="min-width:44px"></span>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px">
      <div style="position:relative;width:min(330px,84vw);border:1.6px solid #141414;box-shadow:inset 0 0 0 3.5px #f6f3ea,inset 0 0 0 4.6px #141414;padding:30px 22px 26px;display:flex;flex-direction:column;align-items:center;gap:13px;text-align:center;background:#faf8f1">
        <span style="font:800 10px 'Hanken Grotesk';letter-spacing:.3em;color:#6d675c">検定試験 ${KYU[q.rank]} — ${esc(label).toUpperCase()}</span>
        <span aria-hidden="true" class="${q.newBadge ? 'qz-pop' : ''}" style="width:96px;height:96px;display:flex;align-items:center;justify-content:center;border-radius:50%;border:3px ${win ? 'solid' : 'dashed'} ${col};color:${col};font:900 44px 'Noto Sans JP';transform:rotate(-7deg)${win ? `;background:${col}10;box-shadow:inset 0 0 0 3px #faf8f1,inset 0 0 0 4px ${col}45` : ''}">${kanji}</span>
        <div class="tnum" style="font:900 38px 'Hanken Grotesk';color:#141414;line-height:1">${q.score}<span style="font-size:19px;color:#6d675c"> / ${n}</span></div>
        <span aria-label="${win ? 'Réussi' : 'Échoué'}" style="display:inline-block;font:900 21px 'Noto Sans JP';color:${win ? red : '#6d675c'};border:2.6px solid ${win ? red : '#8a8478'};border-radius:7px;padding:3px 13px;transform:rotate(-5deg);letter-spacing:.1em${win ? `;text-shadow:0 0 1px ${red}55` : ''}">${verdict}</span>
        <div style="font:700 13px 'Hanken Grotesk';color:#3f3c35">${msg}${win && q.score === n ? ` <span style="color:${red};font-weight:800">満点 !</span>` : ''}</div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
        <button type="button" id="qz-replay" data-autofocus style="cursor:pointer;background:#E60012;color:#fff;border-radius:10px;padding:14px 18px;font:800 13px 'Hanken Grotesk';letter-spacing:.05em">${(state.badges[q.key] || 0) < 3 && win ? 'EXAMEN ' + KYU[Math.min(3, (state.badges[q.key] || 0) + 1)] : 'REJOUER'}</button>
        <button type="button" id="qz-menu2" style="cursor:pointer;background:transparent;color:#141414;border:1.6px solid #141414;border-radius:10px;padding:14px 18px;font:800 13px 'Hanken Grotesk';letter-spacing:.05em">TOUS LES SCEAUX</button>
      </div>
    </div>
  </div>`;
}

function tplQuiz(){
  if (state.quiz.view === 'menu') return tplQzMenu();
  if (state.quiz.view === 'play') return tplQzPlay();
  return tplQzResult();
}

function renderOverlays(){
  const root = document.getElementById('overlays');
  const prevFocus = document.activeElement?.id;
  if (state.review)    root.innerHTML = tplReview();
  else if (state.book) root.innerHTML = tplBook();
  else if (state.quiz) root.innerHTML = tplQuiz();
  else { root.innerHTML = ''; return; }
  const back = prevFocus && root.querySelector('#' + prevFocus);
  if (back && !back.disabled) back.focus({preventScroll:true});
  else root.querySelector('[data-autofocus]')?.focus({preventScroll:true});
}

function closeOverlays(){
  const opener = state.review ? 'btn-review' : state.book ? 'btn-book' : 'btn-quiz';
  state.review = null; state.book = null; state.quiz = null;
  renderOverlays();
  document.getElementById(opener)?.focus();
}

function trapTab(e, root){
  if (e.key !== 'Tab') return;
  const f = [...root.querySelectorAll('button:not([disabled]),[href],input')].filter(el => el.offsetParent !== null);
  if (!f.length) return;
  const first = f[0], last = f[f.length - 1];
  if (e.shiftKey && document.activeElement === first) { last.focus(); e.preventDefault(); }
  else if (!e.shiftKey && document.activeElement === last) { first.focus(); e.preventDefault(); }
}

function wireOverlays(){
  const root = document.getElementById('overlays');
  let drag = null, dragMoved = false;

  root.addEventListener('click', e => {
    if (dragMoved) { dragMoved = false; return; }   // clic fantome apres un swipe
    if (e.target.closest('#rv-close,#rv-close2,#rv-close3,#bk-close')) return closeOverlays();
    if (e.target.closest('#rv-restart'))  return openReview();
    if (e.target.closest('#qz-close'))   return closeOverlays();
    const seal = e.target.closest('[data-qzseal]');
    if (seal) return startQuiz(seal.dataset.qzseal);
    const opt = e.target.closest('[data-qzopt]');
    if (opt && !opt.disabled) return answerQuiz(Number(opt.dataset.qzopt));
    if (e.target.closest('#qz-next'))    return nextQuiz();
    if (e.target.closest('#qz-replay'))  return startQuiz(state.quiz.key);
    if (e.target.closest('#qz-menu2'))   { state.quiz = {view:'menu'}; return renderOverlays(); }
    if (e.target.closest('#rv-reveal') && !e.target.closest('#rv-reveal').disabled) { state.review.revealed = true; return renderOverlays(); }
    if (e.target.closest('#rv-know'))     return flyAndAct('know');
    if (e.target.closest('#rv-again-btn')) return flyAndAct('again');
    const nx = e.target.closest('#bk-next'), pv = e.target.closest('#bk-prev');
    if (nx && !nx.disabled) return bookTurn(1);
    if (pv && !pv.disabled) return bookTurn(-1);
    if (e.target.closest('#rv-card') && state.review && !state.review.revealed) {
      state.review.revealed = true; renderOverlays();
    }
  });

  root.addEventListener('pointerdown', e => {
    const card = e.target.closest('[data-swipe]');
    const page = e.target.closest('[data-pageswipe]');
    if ((!card && !page) || e.target.closest('button')) return;
    drag = {el: card || page, isCard: !!card, x0: e.clientX, y0: e.clientY, dx: 0};
    dragMoved = false;
    drag.el.classList.remove('rv-back');
    // meme piege que flyAndAct : l'animation d'entree ecraserait le transform
    // inline du doigt — sans ca la carte ne suit pas le geste.
    if (drag.isCard) drag.el.style.animation = 'none';
    drag.el.setPointerCapture?.(e.pointerId);
  });

  root.addEventListener('pointermove', e => {
    if (!drag) return;
    const dx = e.clientX - drag.x0, dy = e.clientY - drag.y0;
    drag.dx = dx;
    if (Math.abs(dx) > 6 || Math.abs(dy) > 6) dragMoved = true;
    if (drag.isCard) {
      drag.el.style.transform = `translate(${dx}px,${dy * .25}px) rotate(${dx * .05}deg)`;
      const hr = drag.el.querySelector('[data-hint-r]'), hl = drag.el.querySelector('[data-hint-l]');
      if (hr) hr.style.opacity = Math.min(1, Math.max(0, dx / 110));
      if (hl) hl.style.opacity = Math.min(1, Math.max(0, -dx / 110));
    }
  });

  const endDrag = e => {
    if (!drag) return;
    const {el, isCard, dx} = drag;
    drag = null;
    const rm = matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (isCard) {
      if (dx > 95)       { el.classList.add('rv-fly-r'); setTimeout(() => reviewAct('know'),  rm ? 0 : 300); }
      else if (dx < -95) { el.classList.add('rv-fly-l'); setTimeout(() => reviewAct('again'), rm ? 0 : 300); }
      else { el.classList.add('rv-back'); el.style.transform = ''; }
    } else if (Math.abs(dx) > 60) {
      bookTurn(dx < 0 ? 1 : -1);
    }
  };
  root.addEventListener('pointerup', endDrag);
  root.addEventListener('pointercancel', endDrag);

  // bascule simple page <-> double page si la fenetre change pendant la lecture
  let rz;
  window.addEventListener('resize', () => {
    if (!state.book) return;
    clearTimeout(rz);
    rz = setTimeout(() => {
      if (!state.book) return;
      if (isSpread()) state.book.page -= state.book.page % 2;
      state.book.opened = true;
      renderOverlays();
    }, 150);
  });

  document.addEventListener('keydown', e => {
    const dlg = root.querySelector('[role="dialog"]');
    if (!dlg) return;
    if (e.key === 'Escape') { e.preventDefault(); return closeOverlays(); }
    trapTab(e, dlg);
    if (state.review) {
      if (e.key === ' ')           { e.preventDefault(); if (reviewCard() && !state.review.revealed) { state.review.revealed = true; renderOverlays(); } }
      else if (e.key === 'ArrowRight') { e.preventDefault(); if (reviewCard()) flyAndAct('know'); }
      else if (e.key === 'ArrowLeft')  { e.preventDefault(); if (reviewCard()) flyAndAct('again'); }
    } else if (state.book) {
      if (e.key === 'ArrowRight') { e.preventDefault(); bookTurn(1); }
      if (e.key === 'ArrowLeft')  { e.preventDefault(); bookTurn(-1); }
    } else if (state.quiz && state.quiz.view === 'play' && state.quiz.picked == null && /^[1-9]$/.test(e.key)) {
      const ix = Number(e.key) - 1;
      if (state.quiz.qs[state.quiz.i].opts[ix] != null) { e.preventDefault(); answerQuiz(ix); }
    }
  });
}

wire();
wireOverlays();
render();

/* ------------------------------------------------------------------- PWA
   Le service worker et le manifeste exigent http(s) : en file:// le
   navigateur les bloque (origine "null") et polluerait la console d'erreurs
   CORS. On ne les branche donc qu'en http(s) — en local direct, l'app
   fonctionne, simplement sans hors-ligne ni installation. */
if (location.protocol.startsWith('http')) {
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = 'manifest.webmanifest';
  document.head.appendChild(link);
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => {
        console.warn('Service worker non enregistre :', err);
      });
    });
  }
}
</script>
